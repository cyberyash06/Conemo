services:
  - type: web
    name: conemo-web
    env: docker
    region: ohio
    plan: free

    healthCheckPath: /api/health

    envVars:
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard

      - key: JWT_SECRET
        generateValue: true

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      - key: HOSTNAME
        value: 0.0.0.0

      - key: NEXT_PUBLIC_SITE_URL
        value: https://conemo-web.onrender.com